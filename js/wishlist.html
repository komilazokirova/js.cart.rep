<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopFlow — Wishlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #c8f135;
            --accent-dark: #a8d020;
            --text: #f0f0f0;
            --text-muted: #888;
            --red: #ff4d4d;
            --green: #22c55e;
            --radius: 16px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 32px;
            height: 68px; display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.2s;
        }
        .back-btn:hover { color: var(--accent); }
        .back-btn svg { width: 16px; height: 16px; }
        .page-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); }

        main { max-width: 1200px; margin: 0 auto; padding: 48px 32px 80px; }

        .page-heading { font-family: 'Syne', sans-serif; font-size: clamp(28px, 4vw, 44px); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 40px; }
        .page-heading span { color: #e11d48; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; animation: fadeUp 0.35s ease both; transition: border-color 0.2s; }
        .card:hover { border-color: #444; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        .card-img-wrap { width: 100%; height: 200px; overflow: hidden; background: var(--surface2); }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .card:hover .card-img-wrap img { transform: scale(1.04); }

        .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .card-category { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'Syne', sans-serif; }
        .card-subtotal { font-size: 12px; color: var(--text-muted); }

        .qty-control { display: flex; align-items: center; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
        .qty-btn { width: 38px; height: 38px; border: none; background: var(--surface2); color: var(--text); font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
        .qty-btn.minus:hover { background: rgba(255,77,77,0.2); color: var(--red); }
        .qty-btn.plus:hover { background: rgba(34,197,94,0.2); color: var(--green); }
        .qty-count { flex: 1; text-align: center; font-weight: 700; font-size: 14px; background: var(--surface2); height: 38px; line-height: 38px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); font-family: 'Syne', sans-serif; }

        .remove-btn { margin-top: 4px; width: 100%; padding: 9px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .remove-btn svg { width: 13px; height: 13px; }
        .remove-btn:hover { border-color: #e11d48; color: #e11d48; background: rgba(225,29,72,0.06); }

        .total-bar { margin-top: 32px; display: flex; justify-content: flex-end; }
        .total-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 28px; display: flex; gap: 24px; align-items: center; }
        .total-label { font-size: 14px; color: var(--text-muted); }
        .total-val { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); }

        .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 56px; margin-bottom: 16px; }
        .empty-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .empty p { font-size: 14px; margin-bottom: 24px; }
        .empty a { display: inline-block; padding: 12px 28px; background: var(--accent); color: #000; border-radius: 10px; font-weight: 700; text-decoration: none; font-family: 'Syne', sans-serif; transition: background 0.2s; }
        .empty a:hover { background: var(--accent-dark); }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="../index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Products
        </a>
        <div class="page-logo">ShopFlow</div>
    </div>
</header>

<main>
    <h1 class="page-heading">Your <span>Wishlist ❤️</span></h1>
    <div class="products-grid" id="wishGrid"></div>
    <div class="total-bar" id="totalBar" style="display:none">
        <div class="total-chip">
            <span class="total-label">Total</span>
            <span class="total-val" id="wishTotal">$0</span>
        </div>
    </div>
</main>

<script src="./wishlist.js"></script>
</body>
</html>
