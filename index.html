<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopFlow — Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #c8f135;
            --accent-dark: #a8d020;
            --text: #f0f0f0;
            --text-muted: #888;
            --red: #ff4d4d;
            --green: #22c55e;
            --blue: #3b82f6;
            --radius: 16px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(15,15,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--text); }

        .header-actions { display: flex; gap: 12px; }
        .icon-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
        .icon-btn svg { width: 16px; height: 16px; }
        .badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50px;
            padding: 1px 6px;
            min-width: 18px;
            text-align: center;
        }

        /* MAIN */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 32px 60px;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }
        .page-title span { color: var(--accent); }
        .page-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 48px;
        }

        /* GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .card-img-wrap {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: var(--surface2);
        }
        .card-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .card:hover .card-img-wrap img { transform: scale(1.04); }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-category {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-price {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
            font-family: 'Syne', sans-serif;
        }

        .card-actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        /* WISH BTN */
        .wish-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .wish-btn:hover { border-color: #e11d48; color: #e11d48; background: rgba(225,29,72,0.06); }
        .wish-btn.active { background: rgba(225,29,72,0.12); border-color: #e11d48; color: #e11d48; }
        .wish-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        /* CART BTN */
        .cart-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #000;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .cart-btn:hover { background: var(--accent-dark); }

        /* QUANTITY CONTROL */
        .qty-control {
            display: flex;
            align-items: center;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .qty-btn {
            width: 40px; height: 40px;
            border: none;
            background: var(--surface2);
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn.minus:hover { background: rgba(255,77,77,0.2); color: var(--red); }
        .qty-btn.plus:hover { background: rgba(34,197,94,0.2); color: var(--green); }
        .qty-count {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Syne', sans-serif;
            background: var(--surface2);
            height: 40px;
            line-height: 40px;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 28px; right: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            color: var(--text);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            z-index: 9999;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        /* CARD APPEAR ANIM */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="./index.html" class="logo">Shop<span>Flow</span></a>
        <div class="header-actions">
            <a href="./js/wishlist.html" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                Wishlist
                <span class="badge" id="wishId">0</span>
            </a>
            <a href="./js/cart.html" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                Cart
                <span class="badge" id="cartId">0</span>
            </a>
        </div>
    </div>
</header>

<main>
    <h1 class="page-title">Our <span>Products</span></h1>
    <p class="page-subtitle">Discover our curated collection</p>
    <div class="products-grid" id="productsGrid">
        <div class="loading" style="grid-column:1/-1">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>
    </div>
</main>

<div id="toast"></div>

<script src="./js/index.js"></script>
</body>
</html>
